name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Type-check is the blocking gate (currently green).
      - name: Type-check
        run: pnpm run ts-check

      # Lint is advisory for now: there is a large pre-existing no-explicit-any
      # backlog. Keep it visible without blocking merges; flip to blocking once
      # the backlog is burned down.
      - name: Lint (advisory)
        run: pnpm run lint:build
        continue-on-error: true
